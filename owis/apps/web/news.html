<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OWIS News</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #e2e8f0;
      --brand: #0b5fff;
      --ok: #0f766e;
      --warn: #b45309;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top left, #e2ecff, var(--bg) 40%);
      color: var(--ink);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 16px; font-size: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 18px rgba(15,23,42,0.05);
    }
    .card h3 { margin: 0 0 6px; font-size: 1rem; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .meta { margin-top: 8px; font-size: 0.85rem; color: var(--muted); }
    section { margin: 20px 0 30px; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    textarea, input, select {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 8px;
      font-family: ui-monospace, Consolas, monospace;
    }
    textarea { min-height: 110px; }
    button {
      margin-top: 8px; border: 0; border-radius: 8px; padding: 10px 14px;
      background: var(--brand); color: #fff; cursor: pointer; font-weight: 600;
    }
    .btn-secondary { background: #334155; }
    .btn-warning { background: #b45309; }
    .status { margin-top: 8px; color: var(--ok); font-size: 0.9rem; }
    .status.warn { color: var(--warn); }
    .sources-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .sources-table th, .sources-table td { border-bottom: 1px solid var(--line); padding: 8px; text-align: left; }
    .row-actions button { margin: 0 4px 0 0; padding: 6px 10px; font-size: 0.8rem; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .health-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; border:1px solid #cbd5e1; }
    .health-green { background:#16a34a; }
    .health-yellow { background:#f59e0b; }
    .health-red { background:#dc2626; }
    .health-gray { background:#94a3b8; }
    .badge-paywall { display:inline-block; margin-left:8px; padding:2px 8px; border-radius:999px; font-size:0.72rem; font-weight:700; background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
  <h1>Offshore Wind Intelligence - News</h1>
  <div>
    <a href="/news">News</a>
    <span class="muted">|</span>
    <a href="/opportunities">Opportunities</a>
  </div>
</div>

    <section class="card">
      <h2>Source Admin</h2>
      <p class="muted">Import, edit, activate/deactivate, dedupe and trigger pipeline.</p>

      <h3>Import sources</h3>
      <textarea id="sourceInput" placeholder="Recharge - https://www.rechargenews.com\nhttps://windeurope.org"></textarea>
      <button id="importBtn">Import Sources</button>

      <h3>Edit source</h3>
      <div class="two-col">
        <div>
          <label class="muted">Index</label>
          <input id="editIndex" type="number" readonly />
        </div>
        <div>
          <label class="muted">Name</label>
          <input id="editName" />
        </div>
        <div>
          <label class="muted">Homepage</label>
          <input id="editHomepage" />
        </div>
        <div>
          <label class="muted">Type</label>
          <select id="editType">
            <option value="rss">rss</option>
            <option value="scrape">scrape</option>
          </select>
        </div>
        <div>
          <label class="muted">URL</label>
          <input id="editUrl" />
        </div>
        <div>
          <label class="muted">Priority</label>
          <input id="editPriority" />
        </div>
      </div>
      <button id="saveEditBtn" class="btn-secondary">Save Edit</button>

      <div style="margin-top:10px;">
        <button id="dedupeBtn" class="btn-warning">Remove Duplicates</button>
        <button id='rediscoverBtn' class='btn-secondary'>Rediscover RSS</button>
        <button id='healthBtn' class='btn-secondary'>Source Health</button>
        <button id="runPipelineBtn">Run Fetch + Processing</button>
      </div>

      <div id="adminStatus" class="status"></div>
      <table class="sources-table">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Type</th><th>URL</th><th>Health</th><th>Enabled</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="sourcesBody"></tbody>
      </table>
    </section>

    <section>
      <h2>Latest</h2>
      <div id="latest" class="grid"></div>
    </section>

    <section>
      <h2>Top Signals</h2>
      <div id="top" class="grid"></div>
    </section>

    <section>
      <h2>LinkedIn Candidates</h2>
      <div id="linkedin" class="grid"></div>
    </section>
  </div>

  <script>
    let currentSources = [];
    let healthStateBySource = {};

    async function getJson(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`Request failed: ${path}`);
      return await res.json();
    }

    async function postJson(path, body = {}) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`Request failed: ${path}`);
      return await res.json();
    }

    function setStatus(msg, warn = false) {
      const el = document.getElementById('adminStatus');
      el.textContent = msg;
      el.className = warn ? 'status warn' : 'status';
    }

    function isPaywalled(item) {
      const title = (item.title || '').toLowerCase();
      const summary = (item.summary || '').toLowerCase();
      return title.includes('[paywalled]') || summary.includes('paywalled');
    }

    function renderCards(elId, items) {
      const root = document.getElementById(elId);
      root.innerHTML = '';
      if (!items.length) {
        root.innerHTML = '<p class="muted">No data yet. Run fetch + processing.</p>';
        return;
      }

      for (const item of items) {
        const paywalled = isPaywalled(item);
        const div = document.createElement('article');
        div.className = 'card';
        div.innerHTML = `
          <h3>${item.title}${paywalled ? '<span class="badge-paywall">Paywall</span>' : ''}</h3>
          <p class="muted">${item.summary || 'No summary'}</p>
          <div class="meta">Score: ${item.signal_score} | Source: ${item.source_name || 'Unknown'}</div>
          <div class="meta">Published: ${item.published_at || 'Unknown'}</div>
          <div class="meta"><a href="${item.article_url}" target="_blank" rel="noopener noreferrer">Open source</a></div>
        `;
        root.appendChild(div);
      }
    }

    function fillEditForm(source) {
      document.getElementById('editIndex').value = source.index;
      document.getElementById('editName').value = source.name || '';
      document.getElementById('editHomepage').value = source.homepage || '';
      document.getElementById('editType').value = source.type || 'rss';
      document.getElementById('editUrl').value = source.url || '';
      document.getElementById('editPriority').value = source.priority || 'medium';
    }

    function healthDotClass(color) {
      if (color === 'green') return 'health-dot health-green';
      if (color === 'yellow') return 'health-dot health-yellow';
      if (color === 'red') return 'health-dot health-red';
      return 'health-dot health-gray';
    }

    function renderSourcesTable() {
      const body = document.getElementById('sourcesBody');
      body.innerHTML = '';

      for (const s of currentSources) {
        const health = healthStateBySource[s.name || ''] || {};
        const color = health.health_color || 'gray';
        const tooltip = health.last_error || (health.updated_at ? `Updated ${health.updated_at}` : 'No fetch history yet');

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${s.index}</td>
          <td>${s.name || ''}</td>
          <td>${s.type || ''}</td>
          <td>${s.url || ''}</td>
          <td title="${tooltip.replace(/"/g, '&quot;')}"><span class="${healthDotClass(color)}"></span>${color}</td>
          <td><input type="checkbox" ${s.enabled ? 'checked' : ''} data-toggle-index="${s.index}" /></td>
          <td class="row-actions">
            <button data-edit-index="${s.index}" class="btn-secondary">Edit</button>
          </td>
        `;
        body.appendChild(tr);
      }

      body.querySelectorAll('[data-edit-index]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.getAttribute('data-edit-index'));
          const source = currentSources.find(x => x.index === idx);
          if (source) fillEditForm(source);
        });
      });

      body.querySelectorAll('[data-toggle-index]').forEach(chk => {
        chk.addEventListener('change', async () => {
          const idx = Number(chk.getAttribute('data-toggle-index'));
          await postJson('/api/news/sources/toggle', { index: idx, enabled: chk.checked });
          setStatus(`Updated source #${idx} enabled=${chk.checked}`);
          await refreshSources();
        });
      });
    }

    async function refreshHealthState() {
      const result = await getJson('/api/news/sources/health-state');
      const items = Array.isArray(result.items) ? result.items : [];
      healthStateBySource = {};
      for (const row of items) {
        healthStateBySource[row.source_name] = row;
      }
    }

    async function refreshSources() {
      const [sources] = await Promise.all([
        getJson('/api/news/sources'),
        refreshHealthState(),
      ]);
      currentSources = Array.isArray(sources) ? sources : [];
      renderSourcesTable();
    }

    async function refreshSignals() {
      const [latest, top, linkedin] = await Promise.all([
        getJson('/api/news/latest?limit=12'),
        getJson('/api/news/top-signals?limit=12'),
        getJson('/api/news/linkedin-candidates?limit=12')
      ]);
      renderCards('latest', latest);
      renderCards('top', top);
      renderCards('linkedin', linkedin);
    }

    async function importSourcesFromText() {
      const text = document.getElementById('sourceInput').value.trim();
      if (!text) return;
      const result = await postJson('/api/news/sources/import-text', { text });
      setStatus(`Added ${result.added_count} sources`);
      await refreshSources();
    }

    async function saveEdit() {
      const index = Number(document.getElementById('editIndex').value);
      if (Number.isNaN(index)) {
        setStatus('Select a source via Edit button first.', true);
        return;
      }

      await postJson('/api/news/sources/update', {
        index,
        name: document.getElementById('editName').value,
        homepage: document.getElementById('editHomepage').value,
        type: document.getElementById('editType').value,
        url: document.getElementById('editUrl').value,
        priority: document.getElementById('editPriority').value,
      });

      setStatus(`Saved source #${index}`);
      await refreshSources();
    }

    async function dedupeSources() {
      const result = await postJson('/api/news/sources/dedupe');
      setStatus(`Dedupe done: removed ${result.removed_count} (${result.before} -> ${result.after})`);
      await refreshSources();
    }

    async function rediscoverRSS() {
      const result = await postJson('/api/news/sources/rediscover-rss', { only_scrape: false, with_debug: true });
      let msg = `Rediscover done. updated=${result.updated_count}, checked=${result.checked_count || 0}`;
      if (Array.isArray(result.details)) {
        const misses = result.details.filter(d => d.status === 'no_feed_found');
        if (misses.length) {
          const sample = misses.slice(0, 2).map(m => {
            const base = `${m.source_name || m.homepage}: candidates=${m.candidate_count || 0}`;
            return m.homepage_error ? `${base}, homeErr=${m.homepage_error}` : base;
          }).join(' | ');
          msg += ` | no-feed sample: ${sample}`;
        }
      }
      setStatus(msg, (result.updated_count || 0) === 0);
      await refreshSources();
    }

    async function sourceHealth() {
      const result = await postJson('/api/news/sources/health', { only_enabled: true });
      const items = Array.isArray(result.items) ? result.items : [];
      if (!items.length) {
        setStatus('Health: no enabled sources found.', true);
        return;
      }
      const bad = items.filter(x => x.status !== 'healthy');
      const sample = bad.slice(0, 2).map(x => `${x.source}:${x.status}${x.detail ? `(${x.detail})` : ''}`).join(' | ');
      const msg = `Health done. total=${items.length}, issues=${bad.length}${sample ? ` | sample: ${sample}` : ''}`;
      setStatus(msg, bad.length > 0);
      await refreshSources();
    }

    async function runPipeline() {
      setStatus('Running fetch + processing ...');
      const result = await postJson('/api/news/run/fetch-process');

      let msg = `Done. fetched=${result.fetched_candidates}, new=${result.new_raw_items}, processed=${result.processed_items}`;
      if ((result.fetched_candidates || 0) === 0 && Array.isArray(result.source_report)) {
        const summary = result.source_report.map(r => `${r.source}:items=${r.items},filtered=${r.filtered || 0}${r.error ? ` (${r.error})` : ''}`).join(' | ');
        msg += ` | sources => ${summary}`;
      }

      setStatus(msg, (result.fetched_candidates || 0) === 0);
      await refreshSignals();
      await refreshSources();
    }

    async function boot() {
      document.getElementById('importBtn').addEventListener('click', importSourcesFromText);
      document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
      document.getElementById('dedupeBtn').addEventListener('click', dedupeSources);
      document.getElementById('rediscoverBtn').addEventListener('click', rediscoverRSS);
      document.getElementById('healthBtn').addEventListener('click', sourceHealth);
      document.getElementById('runPipelineBtn').addEventListener('click', runPipeline);

      try {
        await refreshSources();
        await refreshSignals();
      } catch (err) {
        console.error(err);
        setStatus('Failed loading data. Check API logs.', true);
      }
    }

    boot();
  </script>
</body>
</html>
