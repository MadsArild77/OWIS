services:
  - type: web
    name: owis-web
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r owis/requirements.txt
    startCommand: python -m uvicorn owis.apps.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OWI_DB_PATH
        value: /tmp/owi.db
      - key: OWI_NEWS_SOURCES
        value: owis/modules/news/registry/sources.yaml
      - key: OWI_AI_ENABLED
        value: "false"
      - key: OWI_AI_PROVIDER
        value: openai_compatible
      - key: OWI_AI_MODEL
        value: gpt-4o-mini
      - key: OWI_AI_BASE_URL
        value: https://api.openai.com/v1
      - key: OWI_AI_ENDPOINT
        value: /chat/completions
      - key: OWI_AI_INPUT_MAX_CHARS
        value: "3500"
      - key: OWI_AI_MAX_TOKENS
        value: "220"
